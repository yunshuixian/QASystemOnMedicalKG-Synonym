<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医疗知识问答系统 - 毕业设计</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="toast" id="toast"></div>

    <div class="qa-container">
        <div class="qa-header">
            <div class="header-left">
                <h1><i class="bi bi-heart-pulse"></i> 医疗知识问答系统</h1>
                <p>专注解答感冒相关医疗问题</p>
            </div>
            <button id="clearBtn"><i class="bi bi-trash"></i> 清空历史</button>
        </div>

        <div class="qa-chat-box" id="chatBox">
            <div class="message system-message">
                <span class="message-content">你好！我是医疗问答助手，请问有什么感冒相关的问题想要问我？</span>
                <span class="message-time"></span>
            </div>
        </div>

        <div class="qa-input-area">
            <div class="input-wrapper">
                <input type="text" id="questionInput" placeholder="请输入你的问题（比如：感冒的症状是什么？）" maxlength="100">
                <span class="word-count" id="wordCount">0/100</span>
            </div>
            <button id="sendBtn"><i class="bi bi-send"></i> 提问</button>
        </div>

        <div class="qa-footer">
            <p>毕业设计 | 作者：熊锦帅 | 指导老师：兰伟</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
