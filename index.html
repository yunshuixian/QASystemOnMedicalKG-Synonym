<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>医疗知识问答系统</title>
    <link rel="stylesheet" href="style.css">
    <!-- 引入图标库，美化按钮 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
</head>
<body>
    <div class="qa-container">
        <!-- 标题区域 -->
        <div class="qa-header">
            <h1><i class="bi bi-heart-pulse"></i> 医疗知识问答系统</h1>
            <p>专注解答感冒相关医疗问题</p>
        </div>

        <!-- 问答记录展示区 -->
        <div class="qa-chat-box" id="chatBox">
            <!-- 初始欢迎语 -->
            <div class="message system-message">
                你好！我是医疗问答助手，请问有什么感冒相关的问题想要问我？
            </div>
        </div>

        <!-- 输入区域 -->
        <div class="qa-input-area">
            <input type="text" id="questionInput" placeholder="请输入你的问题（比如：感冒的症状是什么？）">
            <button id="sendBtn"><i class="bi bi-send"></i> 提问</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
